name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Версия (v1.2.3)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore youtube-dl-gui.sln || echo "No packages to restore"

      # 🗓 Создаём BuildDate.txt
      - name: Set Build Date
        run: |
          $date = Get-Date -Format "yyyy-MM-dd"
          Set-Content -Path "youtube-dl-gui/Resources/BuildDate.txt" -Value $date
        shell: pwsh

      # 🏗 Сборка решения
      - name: Build solution
        run: msbuild youtube-dl-gui.sln /t:Build /p:Configuration=Release /p:Platform="Any CPU" /p:RunPreBuildEvent=Off /p:RunPostBuildEvent=Off

      # 🗜 Упаковка
      - name: Prepare dist folder
        run: |
          mkdir dist
          copy youtube-dl-gui\bin\Release\youtube-dl-gui.exe dist\
          copy youtube-dl-gui-updater\bin\Release\youtube-dl-gui-updater.exe dist\
          xcopy Languages dist\lang\ /Y
          "C:\Program Files\7-Zip\7z.exe" a dist\youtube-dl-gui.zip dist\*
          "C:\Program Files\7-Zip\7z.exe" a dist\lang.zip Languages\*.ini
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: dist\**

  release:
    runs-on: windows-2022
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-build
          path: ./build

      - name: Detect release type
        id: vars
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          if ($tag -match '^\d+\.\d+\.\d+$') {
            echo "prerelease=false" >> $env:GITHUB_OUTPUT
          } else {
            echo "prerelease=true" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Create GitHub Release
        id: publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          prerelease: ${{ steps.vars.outputs.prerelease }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            ./build/youtube-dl-gui.exe
            ./build/youtube-dl-gui-updater.exe
            ./build/youtube-dl-gui.zip
            ./build/lang.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

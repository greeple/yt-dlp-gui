name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore youtube-dl-gui.sln

      - name: Build solution
        run: msbuild youtube-dl-gui.sln /t:Build /p:Configuration=Release /p:Platform="Any CPU"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-build
          path: |
            Release/**
            youtube-dl-gui/bin/Release/**
            youtube-dl-gui-updater/bin/Release/**

  release:
    runs-on: windows-2022
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-build
          path: ./build

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./build/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
